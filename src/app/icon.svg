<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D2040"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6BA3FF"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Squircle background -->
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>
  <!-- Waveform bars (asymmetric) -->
  <!-- Left bar: shorter, 18px height -->
  <rect x="25" y="31" width="6" height="18" rx="3" fill="url(#bar)"/>
  <!-- Center bar: tallest, 32px height (implicit "i") -->
  <rect x="37" y="24" width="6" height="32" rx="3" fill="url(#bar)"/>
  <!-- Right bar: medium, 24px height -->
  <rect x="49" y="28" width="6" height="24" rx="3" fill="url(#bar)"/>
</svg>
